<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8b1a1a" />
  <meta name="description" content="每日黃曆：國曆農曆、宜忌與個人運勢" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="每日黃曆" />
  <meta name="format-detection" content="telephone=no" />
  <title>每日黃曆</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #9b1c1c;
      --red-deep: #6b1010;
      --red-soft: #c43a3a;
      --gold: #c9a227;
      --gold-light: #e8d48b;
      --gold-pale: #f7efd4;
      --ink: #1a1208;
      --paper: #fbf6ea;
      --paper-dark: #f0e6d0;
      --muted: #6b5c48;
      --yi: #1f6b3a;
      --ji: #9b1c1c;
      --luck-high: #1f6b3a;
      --luck-mid: #b8860b;
      --luck-low: #9b1c1c;
      --shadow: 0 12px 40px rgba(80, 20, 10, 0.18);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 162, 39, 0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(155, 28, 28, 0.08), transparent 50%),
        linear-gradient(165deg, #f8f1df 0%, #efe2c4 45%, #e8d9b8 100%);
      padding: 24px 16px 48px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(48px, env(safe-area-inset-bottom));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    /* 安裝提示（iPhone Safari） */
    .install-tip {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 252, 245, 0.9);
      border: 1px solid rgba(201, 162, 39, 0.4);
      color: var(--ink);
      font-size: 0.88rem;
      line-height: 1.55;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(80, 20, 10, 0.08);
    }

    .install-tip.show { display: block; }

    .install-tip strong {
      color: var(--red-deep);
      font-weight: 700;
    }

    .install-tip .tip-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .install-tip button {
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font: inherit;
      font-size: 0.82rem;
      cursor: pointer;
    }

    .install-tip .btn-ok {
      background: linear-gradient(180deg, var(--red-soft), var(--red));
      color: #fff;
    }

    .install-tip .btn-hide {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(107, 92, 72, 0.35);
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    header.app-header {
      text-align: center;
      margin-bottom: 20px;
    }

    header.app-header .seal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      color: var(--red);
      font-family: "Noto Serif TC", serif;
      font-weight: 900;
      font-size: 22px;
      letter-spacing: 0.05em;
      background: linear-gradient(145deg, #fff8e8, var(--gold-pale));
      box-shadow: inset 0 0 0 3px rgba(155, 28, 28, 0.08), 0 4px 12px rgba(155, 28, 28, 0.12);
      margin-bottom: 10px;
    }

    header.app-header h1 {
      font-family: "Noto Serif TC", serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--red-deep);
      letter-spacing: 0.2em;
    }

    header.app-header p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.12em;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      background: rgba(255, 252, 245, 0.72);
      border: 1px solid rgba(201, 162, 39, 0.35);
      border-radius: 999px;
      padding: 8px 10px;
      backdrop-filter: blur(8px);
    }

    .date-nav input[type="date"] {
      flex: 1;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 0.95rem;
      color: var(--ink);
      text-align: center;
      outline: none;
      min-width: 0;
    }

    .date-nav button {
      border: none;
      background: linear-gradient(180deg, var(--red-soft), var(--red));
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(155, 28, 28, 0.25);
      transition: transform 0.15s ease, filter 0.15s ease;
      flex-shrink: 0;
    }

    .date-nav button:hover { filter: brightness(1.08); }
    .date-nav button:active { transform: scale(0.95); }

    .date-nav .today-btn {
      width: auto;
      border-radius: 999px;
      padding: 0 14px;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      background: linear-gradient(180deg, #d4b84a, var(--gold));
      color: var(--ink);
      font-weight: 600;
    }

    .card {
      background: var(--paper);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(201, 162, 39, 0.4);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(201, 162, 39, 0.45);
      border-radius: calc(var(--radius) - 6px);
      pointer-events: none;
      z-index: 1;
    }

    .banner {
      background: linear-gradient(135deg, var(--red-deep) 0%, var(--red) 50%, #b42828 100%);
      color: var(--gold-pale);
      padding: 22px 20px 20px;
      text-align: center;
      position: relative;
    }

    .banner::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--gold) 0 12px,
        var(--gold-light) 12px 24px
      );
    }

    .banner .weekday {
      font-size: 0.95rem;
      letter-spacing: 0.25em;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .banner .solar {
      font-family: "Noto Serif TC", serif;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #fff;
    }

    .banner .lunar {
      margin-top: 8px;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      color: var(--gold-light);
    }

    .banner .ganzhi-line {
      margin-top: 10px;
      font-family: "Noto Serif TC", serif;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: #fff;
    }

    .zodiac-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(232, 212, 139, 0.45);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    .body {
      padding: 20px 18px 22px;
      position: relative;
      z-index: 2;
    }

    .section-title {
      font-family: "Noto Serif TC", serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--red-deep);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title::before,
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 162, 39, 0.7), transparent);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .meta-item {
      background: linear-gradient(180deg, #fffdf7, var(--paper-dark));
      border: 1px solid rgba(201, 162, 39, 0.28);
      border-radius: 12px;
      padding: 12px 10px;
      text-align: center;
    }

    .meta-item .label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    .meta-item .value {
      font-family: "Noto Serif TC", serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--red-deep);
      letter-spacing: 0.08em;
      line-height: 1.4;
    }

    .meta-item.full { grid-column: 1 / -1; }

    .yi-ji {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .yi-box, .ji-box {
      border-radius: 14px;
      padding: 14px 12px;
      min-height: 140px;
    }

    .yi-box {
      background: linear-gradient(160deg, #eef8f0, #dff0e4);
      border: 1px solid rgba(31, 107, 58, 0.25);
    }

    .ji-box {
      background: linear-gradient(160deg, #fdf0f0, #f8e2e2);
      border: 1px solid rgba(155, 28, 28, 0.22);
    }

    .yi-box h3, .ji-box h3 {
      font-family: "Noto Serif TC", serif;
      font-size: 1.15rem;
      letter-spacing: 0.35em;
      text-align: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px dashed currentColor;
      opacity: 0.9;
    }

    .yi-box h3 { color: var(--yi); }
    .ji-box h3 { color: var(--ji); }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .tag {
      font-size: 0.82rem;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.06em;
      background: rgba(255, 255, 255, 0.65);
    }

    .yi-box .tag { color: var(--yi); border: 1px solid rgba(31, 107, 58, 0.2); }
    .ji-box .tag { color: var(--ji); border: 1px solid rgba(155, 28, 28, 0.18); }

    .quote {
      margin-top: 4px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(201, 162, 39, 0.12), rgba(155, 28, 28, 0.06));
      border-left: 3px solid var(--gold);
      border-radius: 0 12px 12px 0;
      font-family: "Noto Serif TC", serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink);
      letter-spacing: 0.04em;
    }

    .quote .q-label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
      font-family: "Noto Sans TC", sans-serif;
    }

    /* ===== 個人運勢 ===== */
    .personal-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .personal {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(201, 162, 39, 0.45);
      background: linear-gradient(180deg, #fffdf8 0%, #f7efe0 100%);
      box-shadow: 0 6px 20px rgba(80, 30, 10, 0.08);
    }

    .personal.female .personal-head {
      background: linear-gradient(120deg, #4a2040 0%, #7a3a5c 40%, #9b4a6e 100%);
    }

    .personal-head {
      background: linear-gradient(120deg, #3d2a12 0%, #6b4a1e 40%, #8a6528 100%);
      color: var(--gold-pale);
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .personal-head .who {
      font-family: "Noto Serif TC", serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .personal-head .who small {
      display: block;
      margin-top: 4px;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      opacity: 0.88;
      color: var(--gold-light);
    }

    .luck-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(232, 212, 139, 0.4);
    }

    .luck-badge .score {
      font-family: "Noto Serif TC", serif;
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }

    .luck-badge .level {
      margin-top: 4px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: var(--gold-light);
    }

    .personal-body { padding: 14px 14px 16px; }

    .profile-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .profile-row .chip {
      background: rgba(201, 162, 39, 0.12);
      border-color: rgba(201, 162, 39, 0.35);
      color: var(--red-deep);
      font-size: 0.78rem;
    }

    .relation-box {
      text-align: center;
      padding: 10px 12px;
      margin-bottom: 14px;
      border-radius: 10px;
      background: rgba(155, 28, 28, 0.05);
      border: 1px dashed rgba(155, 28, 28, 0.2);
      font-family: "Noto Serif TC", serif;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: var(--red-deep);
      line-height: 1.5;
    }

    .stars {
      color: var(--gold);
      letter-spacing: 0.08em;
      font-size: 0.9rem;
    }

    .aspect-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .aspect {
      background: #fff;
      border: 1px solid rgba(201, 162, 39, 0.25);
      border-radius: 10px;
      padding: 10px 10px 8px;
    }

    .aspect .a-name {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .aspect .a-bar {
      height: 6px;
      border-radius: 999px;
      background: #eee5d4;
      overflow: hidden;
      margin: 6px 0 4px;
    }

    .aspect .a-bar > i {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--gold), var(--red-soft));
    }

    .aspect .a-score {
      font-family: "Noto Serif TC", serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
    }

    .aspect .a-stars { font-size: 0.75rem; color: var(--gold); }

    .advice-block {
      margin-bottom: 12px;
      border-radius: 12px;
      padding: 12px;
      background: #fff;
      border: 1px solid rgba(201, 162, 39, 0.22);
    }

    .advice-block h4 {
      font-family: "Noto Serif TC", serif;
      font-size: 0.92rem;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .advice-block.do h4 { color: var(--yi); }
    .advice-block.dont h4 { color: var(--ji); }
    .advice-block.note h4 { color: #6b4a1e; }

    .advice-block ul {
      margin: 0;
      padding-left: 1.15em;
      font-size: 0.88rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .advice-block ul li { margin-bottom: 2px; }

    .summary-text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink);
      letter-spacing: 0.03em;
      padding: 2px 2px 0;
    }

    footer {
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    @media (max-width: 420px) {
      .banner .solar { font-size: 1.35rem; }
      .meta-grid { gap: 8px; }
      .yi-ji { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="install-tip" id="installTip" role="status">
      <strong>加到 iPhone 主畫面</strong>，之後可像 App 一樣點開查詢（離線也能用）：<br />
      1. 點 Safari 底部<strong>分享</strong>（方框＋向上箭頭）<br />
      2. 往下滑選 <strong>加入主畫面</strong> → 加入
      <div class="tip-actions">
        <button type="button" class="btn-ok" id="tipGotIt">知道了</button>
        <button type="button" class="btn-hide" id="tipNever">不再顯示</button>
      </div>
    </div>

    <header class="app-header">
      <div class="seal">曆</div>
      <h1>每日黃曆</h1>
      <p>擇日 · 宜忌 · 干支</p>
    </header>

    <div class="date-nav">
      <button type="button" id="prevDay" aria-label="前一天">‹</button>
      <input type="date" id="datePicker" />
      <button type="button" id="nextDay" aria-label="後一天">›</button>
      <button type="button" class="today-btn" id="todayBtn">今日</button>
    </div>

    <article class="card" id="almanac">
      <div class="banner">
        <div class="weekday" id="weekday">—</div>
        <div class="solar" id="solarDate">—</div>
        <div class="lunar" id="lunarDate">—</div>
        <div class="ganzhi-line" id="ganzhiLine">—</div>
        <div class="zodiac-row">
          <span class="chip" id="zodiacChip">生肖 —</span>
          <span class="chip" id="constellationChip">星座 —</span>
          <span class="chip" id="jieqiChip">節氣 —</span>
        </div>
      </div>

      <div class="body">
        <div class="section-title">日辰要覽</div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="label">五行</div>
            <div class="value" id="wuxing">—</div>
          </div>
          <div class="meta-item">
            <div class="label">納音</div>
            <div class="value" id="nayin">—</div>
          </div>
          <div class="meta-item">
            <div class="label">冲煞</div>
            <div class="value" id="chongsha">—</div>
          </div>
          <div class="meta-item">
            <div class="label">值神</div>
            <div class="value" id="zhishen">—</div>
          </div>
          <div class="meta-item">
            <div class="label">吉神宜趨</div>
            <div class="value" id="jishen">—</div>
          </div>
          <div class="meta-item">
            <div class="label">凶神宜忌</div>
            <div class="value" id="xiongshen">—</div>
          </div>
          <div class="meta-item full">
            <div class="label">方位參考</div>
            <div class="value" id="fangwei">—</div>
          </div>
        </div>

        <div class="section-title">今日宜忌</div>
        <div class="yi-ji">
          <div class="yi-box">
            <h3>宜</h3>
            <div class="tag-list" id="yiList"></div>
          </div>
          <div class="ji-box">
            <h3>忌</h3>
            <div class="tag-list" id="jiList"></div>
          </div>
        </div>

        <div class="section-title">彭祖百忌</div>
        <div class="quote">
          <span class="q-label">今日宜謹記</span>
          <span id="pengzu">—</span>
        </div>

        <div class="section-title" style="margin-top: 20px;">個人專屬運勢</div>
        <div class="personal-list" id="personalList" aria-label="個人運勢列表"></div>
      </div>
    </article>

    <footer>
      傳統黃曆文化參考 · 個人運勢依生肖干支與建除簡推<br />
      僅供趣味與民俗參考 · 非專業命理／擇日依據
    </footer>
  </div>

  <script>
    /* ========== 常數 ========== */
    const TIAN_GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const DI_ZHI = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

    /* ========== 工具 ========== */
    function pad(n) { return String(n).padStart(2, "0"); }

    function toDateKey(d) {
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;

    function parseDateKey(s) {
      const [y, m, d] = s.split("-").map(Number);

    function daysBetween(a, b) {
      const ms = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate()) -
                 Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
      return Math.floor(ms / 86400000);

    function leapMonth(y) {
      return LUNAR_INFO[y - 1900] & 0xf;
    }

    function leapDays(y) {
      if (leapMonth(y)) return (LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29;
      return 0;
    }

    function monthDays(y, m) {
      return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29;
    }

    function yearDays(y) {
      let sum = 348;
      for (let i = 0x8000; i > 0x8; i >>= 1) {
        sum += (LUNAR_INFO[y - 1900] & i) ? 1 : 0;
      }
      return sum + leapDays(y);
    }

    function solarToLunar(date) {
      const base = new Date(1900, 0, 31);
      let offset = daysBetween(base, date);
      if (offset < 0 || date.getFullYear() > 2100) {
        return { year: date.getFullYear(), month: 1, day: 1, isLeap: false, yearDays: 0 };
      }

      let year = 1900;
      let daysOfYear = 0;
      for (; year < 2101 && offset > 0; year++) {
        daysOfYear = yearDays(year);
        offset -= daysOfYear;
      }
      if (offset < 0) {
        offset += daysOfYear;
        year--;
      }

      const leap = leapMonth(year);
      let isLeap = false;
      let month = 1;
      let daysOfMonth = 0;

      for (; month < 13 && offset > 0; month++) {
        if (leap > 0 && month === leap + 1 && !isLeap) {
          month--;
          isLeap = true;
          daysOfMonth = leapDays(year);
        } else {
          daysOfMonth = monthDays(year, month);
        }
        if (isLeap && month === leap + 1) isLeap = false;
        offset -= daysOfMonth;
      }

      if (offset === 0 && leap > 0 && month === leap + 1) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          month--;
        }
      }
      if (offset < 0) {
        offset += daysOfMonth;
        month--;
      }

      return {
        year,
        month,
        day: offset + 1,
        isLeap,
        yearDays: yearDays(year)
      };
    }

    const LIUHE = { 子: "丑", 丑: "子", 寅: "亥", 亥: "寅", 卯: "戌", 戌: "卯", 辰: "酉", 酉: "辰", 巳: "申", 申: "巳", 午: "未", 未: "午" };
    const LIUHAI = { 子: "未", 未: "子", 丑: "午", 午: "丑", 寅: "巳", 巳: "寅", 卯: "辰", 辰: "卯", 申: "亥", 亥: "申", 酉: "戌", 戌: "酉" };
    const SANHE_GROUPS = [
      ["申", "子", "辰"],
      ["亥", "卯", "未"],
      ["寅", "午", "戌"],

    ];

    function getJiaZiIndex(gan, zhi) {
      for (let i = 0; i < 60; i++) {
        if (TIAN_GAN[i % 10] === gan && DI_ZHI[i % 12] === zhi) return i;
      }
      return 0;
    }

    function wuxingRelation(a, b) {
      // 生：木火土金水木
      const order = ["木", "火", "土", "金", "水"];
      const ia = order.indexOf(a);
      const ib = order.indexOf(b);
      if (ia < 0 || ib < 0) return "平";
      if (ia === ib) return "同";
      if ((ia + 1) % 5 === ib) return "我生";
      if ((ib + 1) % 5 === ia) return "生我";
      if ((ia + 2) % 5 === ib) return "我克";
      if ((ib + 2) % 5 === ia) return "克我";
      return "平";
    }

    function zhiRelation(myZhi, dayZhi) {
      if (myZhi === dayZhi) return { key: "值", label: "本命日（日支同命支）", score: 8 };
      if (LIUHE[myZhi] === dayZhi) return { key: "合", label: "六合日 · 貴人相助", score: 18 };
      if (CHONG_MAP[myZhi] === dayZhi) return { key: "冲", label: "六冲日 · 變動較大", score: -22 };
      if (LIUHAI[myZhi] === dayZhi) return { key: "害", label: "六害日 · 小人暗耗", score: -14 };
      for (const g of SANHE_GROUPS) {
        if (g.includes(myZhi) && g.includes(dayZhi) && myZhi !== dayZhi) {
          return { key: "三合", label: "三合日 · 氣場相助", score: 14 };
        }
      }
      // 相刑簡化：丑未戌
      const xing = { 丑: ["未", "戌"], 未: ["丑", "戌"], 戌: ["丑", "未"], 寅: ["巳", "申"], 巳: ["寅", "申"], 申: ["寅", "巳"], 子: ["卯"], 卯: ["子"] };
      if (xing[myZhi] && xing[myZhi].includes(dayZhi)) {
        return { key: "刑", label: "相刑日 · 內心較躁", score: -10 };
      }
      return { key: "平", label: "平穩日 · 無大冲合", score: 2 };
    }

    function starText(score) {
      const n = Math.max(1, Math.min(5, Math.round(score / 20)));
      return "★".repeat(n) + "☆".repeat(5 - n);

    function luckLevel(score) {
      if (score >= 85) return "大吉";
      if (score >= 72) return "吉";

      if (score >= 32) return "小凶";
      return "慎";
    }

    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

    function ensurePersonProfile(person) {
      if (person.birthDayGZ) return person;

      d.setHours(12, 0, 0, 0);

      const dayGZ = getDayGanZhi(d);
      const monthGZ = getMonthGanZhi(by, bm);
      person.birthDayGZ = dayGZ;
      person.birthYearGZ = yearGZ;
      person.birthMonthGZ = monthGZ;
      person.birthLunar = lunar;
      person.yearGan = yearGZ.gan;
      person.yearZhi = yearGZ.zhi;
      person.xiao = ZHI_TO_XIAO[yearGZ.zhi];
      person.constellation = getConstellation(bm, Number(person.birthSolar.split("-")[2]));
      person.titleHint = `${yearGZ.full}${person.xiao} · ${person.constellation}` +
        (person.gender === "female" ? " · 女" : person.gender === "male" ? "" : "");
      return person;
    }

    function birthSeed(person) {
      return Number(person.birthSolar.replace(/-/g, ""));
    }

    function computePersonalFortune(date, almanacCtx, person) {
      ensurePersonProfile(person);
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const dayGZ = almanacCtx.dayGZ;
      const jianchu = almanacCtx.jianchu;
      const yiji = almanacCtx.yiji;
      const isFemale = person.gender === "female";

      const birthDay = person.birthDayGZ;
      const rel = zhiRelation(person.yearZhi, dayGZ.zhi);

      const dayWx = WUXING_GAN[dayGZ.gan];
      const birthDayWx = WUXING_GAN[birthDay.gan];
      const yearWx = WUXING_GAN[person.yearGan];
      const wxRelDay = wuxingRelation(yearWx, dayWx);
      const wxRelSelf = wuxingRelation(birthDayWx, dayWx);

      let wxScore = 0;
      if (person.preferWx.includes(dayWx)) wxScore += 10;
      if (person.avoidWx.includes(dayWx)) wxScore -= 12;
      if (wxRelDay === "生我" || wxRelSelf === "生我") wxScore += 8;
      if (wxRelDay === "克我" || wxRelSelf === "克我") wxScore -= 8;
      if (wxRelDay === "同" || wxRelSelf === "同") wxScore += 4;

      let pillarScore = 0;
      if (birthDay.full === dayGZ.full) pillarScore += 12;
      if (birthDay.gan === dayGZ.gan) pillarScore += 5;
      if (CHONG_MAP[birthDay.zhi] === dayGZ.zhi) pillarScore -= 10;

      const jianchuBonus = {
        建: 4, 除: 2, 滿: 6, 平: 0, 定: 8, 執: -2,
        破: -14, 危: -4, 成: 10, 收: 6, 開: 8, 閉: -6
      }[jianchu] || 0;

      const yearZhiToday = almanacCtx.yearGZ.zhi;
      const isTaiSui = yearZhiToday === person.yearZhi;
      const isChongTaiSui = CHONG_MAP[person.yearZhi] === yearZhiToday;

      const seed = y * 10000 + m * 100 + d + birthSeed(person);
      const micro = ((seed * 9301 + 49297) % 13) - 6;

      let total = 58 + rel.score + wxScore + pillarScore + jianchuBonus + micro;
      if (isTaiSui) total -= 6;
      if (isChongTaiSui) total -= 4;
      if (jianchu === "破") total -= 4;
      total = clamp(Math.round(total), 18, 96);

      const career = clamp(total + (["成", "開", "定", "建"].includes(jianchu) ? 6 : 0) + (rel.key === "冲" ? -8 : 0) + ((seed % 7) - 3), 15, 98);
      const wealth = clamp(total + (["滿", "成", "收", "開"].includes(jianchu) ? 7 : 0) + (person.preferWx.includes(dayWx) ? 5 : -3) + (((seed >> 2) % 7) - 3), 15, 98);
      const social = clamp(total + (rel.key === "合" || rel.key === "三合" ? 10 : 0) + (rel.key === "害" || rel.key === "冲" ? -10 : 0) + (((seed >> 3) % 7) - 3), 15, 98);
      const health = clamp(total + (jianchu === "破" || jianchu === "危" ? -10 : 4) + (rel.key === "刑" ? -6 : 0) + (((seed >> 4) % 7) - 3), 15, 98);
      // 女生感情運：合日加分，冲害日更敏感
      const love = clamp(
        social + (isFemale ? 2 : 0) + (rel.key === "合" ? 4 : 0) + (rel.key === "冲" || rel.key === "害" ? -4 : 0) + (((seed >> 5) % 5) - 2),

      );

      const [by, bm, bd] = person.birthSolar.split("-").map(Number);

      const personYi = [];

        notes.push(`今日與本命「${person.xiao}」相冲，情緒與行程易有意外波動，重大決定宜再緩一日。`);
        if (isFemale) notes.push("感情上避免翻舊帳或突然攤牌，給彼此一點緩衝空間。");

        personJi.push("輕信他人、私下傳話", "借貸擔保");

        notes.push("日支與本命相同，適合反思與調整節奏，不宜過度勞累。");

      if (["成", "開", "滿", "定"].includes(jianchu) && rel.key !== "冲") {
        personYi.push(isFemale ? "推進工作進度、學習進修" : "推進專案節點、簡報提案");

      if (isFemale && love < 50) {

      const sharedJi = yiji.ji.filter(x => x !== "諸事不宜").slice(0, 2);
      personYi.push(...sharedYi.map(x => `黃曆亦宜：${x}`));
      personJi.push(...sharedJi.map(x => `黃曆亦忌：${x}`));

      const uniq = (arr) => [...new Set(arr)].slice(0, 6);

          : `整體運勢「${level}」。${who}今日氣場較順，${person.summaryTone}的細膩正好派上用場；適合把重要事情往前推進，記得見好就收、勿過度透支體力。`;

      } else if (total >= 40) {

          : `整體運勢「${level}」。今日較適合守成與內部整理，對外談判或高風險行動可延後；多聽少辯，保護好情緒與錢包。`;

      }

      const L = person.birthLunar;
      const lunarShort = (L.isLeap ? "閏" : "") + LUNAR_MONTHS[L.month - 1] + "月" + LUNAR_DAYS[L.day - 1];

      return {
        person,
        score: total,
        level,
        stars: starText(total),
        relation: rel,
        age,
        xuAge,
        birthDayPillar: birthDay.full,
        birthYearPillar: person.birthYearGZ.full,
        birthMonthPillar: person.birthMonthGZ.full,
        lunarShort,
        aspects: isFemale
          ? [
              { name: "事業", score: career },
              { name: "財運", score: wealth },
              { name: "感情", score: love },
              { name: "健康", score: health }
            ]
          : [
              { name: "事業", score: career },
              { name: "財運", score: wealth },
              { name: "人際", score: social },
              { name: "健康", score: health }
            ],
        yi,
        ji,
        notes: uniq(notes).slice(0, 5),
        summary,
        chips: [
          `生肖 ${person.xiao}`,
          person.genderLabel ? `性別 ${person.genderLabel}` : null,
          `年柱 ${person.birthYearGZ.full}`,
          `日柱 ${birthDay.full}`,
          `星座 ${person.constellation}`,
          `虛歲 ${xuAge}`,
          `週歲 ${age}`
        ].filter(Boolean)
      };
    }

    /* ========== 主計算 ========== */
    function computeAlmanac(date) {
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const lunar = solarToLunar(date);
      const yearGZ = getYearGanZhi(lunar.year);
      const monthGZ = getMonthGanZhi(y, m);
      const dayGZ = getDayGanZhi(date);
      const jianchu = getJianChu(dayGZ.zhi, monthGZ.zhi);
      const yiji = JIANCHU_YIJI[jianchu];
      const seed = y * 10000 + m * 100 + d + dayGZ.gan.charCodeAt(0);

      const jieqi = getJieQi(date);
      const jieqiText = jieqi.isToday
        ? `今日${jieqi.name}`
        : `${jieqi.name} · ${jieqi.daysToNext}日後${jieqi.next}`;

      const base = {
        weekday: `星期${WEEKDAYS[date.getDay()]}`,
        solar: `${y}年${m}月${d}日`,
        lunar: formatLunar(lunar, yearGZ),
        ganzhiLine: `${yearGZ.full}年 ${monthGZ.full}月 ${dayGZ.full}日`,
        zodiac: `生肖 ${ZHI_TO_XIAO[yearGZ.zhi]}`,
        constellation: `星座 ${getConstellation(m, d)}`,
        jieqi: jieqiText,
        wuxing: `${WUXING_GAN[dayGZ.gan]}${WUXING_ZHI[dayGZ.zhi]}之日`,
        nayin: getNaYin(dayGZ.full),
        chongsha: `冲${ZHI_TO_XIAO[CHONG_MAP[dayGZ.zhi]]}(${CHONG_MAP[dayGZ.zhi]}) 煞${SHA_MAP[dayGZ.zhi]}`,
        zhishen: `${jianchu}日`,
        jishen: pickStable(JISHEN_LIST, seed, 3).join("、"),
        xiongshen: pickStable(XIONGSHEN_LIST, seed + 7, 3).join("、"),
        fangwei: getDirections(dayGZ.gan),
        yi: yiji.yi,
        ji: yiji.ji,
        pengzu: `${PENGZU[dayGZ.gan]}，${PENGZU[dayGZ.zhi]}`,
        // for personal
        dayGZ, monthGZ, yearGZ, jianchu, yiji
      };
      base.personals = PERSONS.map((person) => computePersonalFortune(date, base, person));
      return base;
    }

    function renderPersonCard(p) {
      const person = p.person;
      const badgeShadow =
        p.score >= 72 ? "0 0 0 1px rgba(31,107,58,0.5)" :
        p.score < 45 ? "0 0 0 1px rgba(155,28,28,0.55)" : "none";
      const genderClass = person.gender === "female" ? " female" : "";

      return `
        <section class="personal${genderClass}" aria-label="${person.label}出生個人運勢">
          <div class="personal-head">
            <div class="who">
              ${person.titleHint}
              <small>${person.label} 出生 · 農曆${p.lunarShort} · 日柱${p.birthDayPillar}</small>

          <div class="personal-body">
            <div class="profile-row">${p.chips.map(c => `<span class="chip">${c}</span>`).join("")}</div>

            <div class="aspect-grid">
              ${p.aspects.map(a => `
                <div class="aspect">
                  <div class="a-name">${a.name}</div>
                  <div class="a-score">${a.score} 分</div>
                  <div class="a-bar"><i style="width:${a.score}%"></i></div>
                  <div class="a-stars">${starText(a.score)}</div>
                </div>
              `).join("")}
            </div>

              <h4>● 今日注意</h4>
              <ul>${p.notes.map(t => `<li>${t}</li>`).join("")}</ul>

      `;
    }

    function render(date) {
      const data = computeAlmanac(date);
      document.getElementById("weekday").textContent = data.weekday;
      document.getElementById("solarDate").textContent = data.solar;
      document.getElementById("lunarDate").textContent = data.lunar;
      document.getElementById("ganzhiLine").textContent = data.ganzhiLine;
      document.getElementById("zodiacChip").textContent = data.zodiac;
      document.getElementById("constellationChip").textContent = data.constellation;
      document.getElementById("jieqiChip").textContent = data.jieqi;
      document.getElementById("wuxing").textContent = data.wuxing;
      document.getElementById("nayin").textContent = data.nayin;
      document.getElementById("chongsha").textContent = data.chongsha;
      document.getElementById("zhishen").textContent = data.zhishen;
      document.getElementById("jishen").textContent = data.jishen;
      document.getElementById("xiongshen").textContent = data.xiongshen;
      document.getElementById("fangwei").textContent = data.fangwei;
      document.getElementById("pengzu").textContent = data.pengzu;

      const yiList = document.getElementById("yiList");
      const jiList = document.getElementById("jiList");
      yiList.innerHTML = data.yi.map(t => `<span class="tag">${t}</span>`).join("");
      jiList.innerHTML = data.ji.map(t => `<span class="tag">${t}</span>`).join("");

      document.getElementById("personalList").innerHTML =
        data.personals.map(renderPersonCard).join("");

      document.getElementById("datePicker").value = toDateKey(date);
    }

    /* ========== 互動 ========== */
    let current = new Date();
    current.setHours(12, 0, 0, 0);

    const picker = document.getElementById("datePicker");
    document.getElementById("prevDay").addEventListener("click", () => {
      current.setDate(current.getDate() - 1);
      render(current);
    });
    document.getElementById("nextDay").addEventListener("click", () => {
      current.setDate(current.getDate() + 1);
      render(current);
    });
    document.getElementById("todayBtn").addEventListener("click", () => {
      current = new Date();
      current.setHours(12, 0, 0, 0);
      render(current);
    });
    picker.addEventListener("change", () => {
      if (!picker.value) return;
      current = parseDateKey(picker.value);
      current.setHours(12, 0, 0, 0);
      render(current);
    });

    // 鍵盤左右切換日期
    document.addEventListener("keydown", (e) => {
      if (e.target.matches("input")) return;
      if (e.key === "ArrowLeft") {
        current.setDate(current.getDate() - 1);
        render(current);
      } else if (e.key === "ArrowRight") {
        current.setDate(current.getDate() + 1);
        render(current);
      } else if (e.key === "t" || e.key === "T") {
        current = new Date();
        current.setHours(12, 0, 0, 0);
        render(current);
      }
    });

    render(current);

    /* ========== PWA / iPhone 安裝提示 ========== */
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    (function setupInstallTip() {
      const tip = document.getElementById("installTip");
      const key = "huangli-hide-install-tip";
      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const dismissed = localStorage.getItem(key) === "1";

      if (!isStandalone && isIOS && !dismissed) {
        tip.classList.add("show");
      }

      document.getElementById("tipGotIt").addEventListener("click", () => {
        tip.classList.remove("show");
        sessionStorage.setItem("huangli-tip-session", "1");
      });
      document.getElementById("tipNever").addEventListener("click", () => {
        tip.classList.remove("show");
        localStorage.setItem(key, "1");
      });
      if (sessionStorage.getItem("huangli-tip-session") === "1") {
        tip.classList.remove("show");
      }
    })();
  </script>
</body>
</html>
